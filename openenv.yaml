spec_version: 1
name: maskguard_openenv
description: Policy-aware OpenEnv reinforcement learning environment for iterative PII masking and compliance validation.
type: space
runtime: fastapi
app: server.app:app
port: 8000
observation_space:
  - text
  - detected_entities
  - masked_entities
  - remaining_entities
  - policy_mode
  - step_count
  - task_name
  - difficulty
  - score
  - grader
action_space:
  - detect_entity
  - mask_entity
  - skip_entity
  - validate_document
  - recheck_entities
  - submit_result
reward_function:
  range: [0.0, 1.0]
  partial_progress_signals:
    correct_mask: positive
    missed_entity: negative
    overmask: negative
    compliance_success: positive
    invalid_masking: negative
policy_modes:
  - GDPR
  - HIPAA
  - FINANCE
evaluation_metrics:
  - precision
  - recall
  - f1_score
  - compliance_score
  - score
tasks:
  - id: contact_masking
    name: contact_masking
    difficulty: easy
    grader: contact_masking_grader
  - id: healthcare_note
    name: healthcare_note
    difficulty: medium
    grader: healthcare_note_grader
  - id: finance_record
    name: finance_record
    difficulty: hard
    grader: finance_record_grader
  - id: education_record
    name: education_record
    difficulty: medium
    grader: education_record_grader
  - id: legal_disclosure
    name: legal_disclosure
    difficulty: hard
    grader: legal_disclosure_grader
  - id: hr_portal
    name: hr_portal
    difficulty: medium
    grader: hr_portal_grader
